apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: forensics-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          args: ["--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: forensics-operator
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: __FO_REDIS_STORAGE__
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: forensics-operator
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
