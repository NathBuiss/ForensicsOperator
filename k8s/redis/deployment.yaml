apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: __FO_NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          args:
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
            - "--maxmemory"
            - "800mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--tcp-keepalive"
            - "300"
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: __FO_NAMESPACE__
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
