apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-operator-ingress
  namespace: forensics-operator
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # cert-manager.io/cluster-issuer: letsencrypt-prod  # Uncomment for TLS
spec:
  ingressClassName: nginx
  # tls:                                                # Uncomment for TLS
  #   - hosts:
  #       - forensics.example.com
  #     secretName: forensics-operator-tls
  rules:
    - host: forensics.example.com   # Change to your hostname
      http:
        paths:
          # API (no rewrite — FastAPI handles /api/v1/*)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-service
                port:
                  number: 8000
          # Kibana (rewrite to strip /kibana prefix)
          - path: /kibana(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kibana-service
                port:
                  number: 5601
          # MinIO console
          - path: /minio(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: minio-service
                port:
                  number: 9001
          # Frontend SPA (catch-all — must be last)
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
