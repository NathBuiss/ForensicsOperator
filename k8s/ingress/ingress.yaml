# ── Traefik Middlewares ────────────────────────────────────────────────────────

# ServersTransport: disable response-header timeout for the API backend.
# Without this, Traefik kills connections when the API takes >60 s to start
# responding — which happened when streaming large (500 MB+) files to MinIO
# synchronously.  Now that MinIO upload is handled in BackgroundTasks (after
# the HTTP response is sent), this guard is extra insurance.
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: api-no-timeout
  namespace: __FO_NAMESPACE__
spec:
  serverName: ""
  insecureSkipVerify: false
  maxIdleConnsPerHost: 32
  forwardingTimeouts:
    dialTimeout: "30s"
    responseHeaderTimeout: "0s"   # wait indefinitely for response headers
    idleConnTimeout: "120s"
---
# HTTP → HTTPS permanent redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: __FO_NAMESPACE__
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Strip /minio prefix before forwarding to MinIO console
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-minio
  namespace: __FO_NAMESPACE__
spec:
  stripPrefix:
    prefixes:
      - /minio
---
# ── HTTP catch-all → redirect to HTTPS ────────────────────────────────────────
# This single rule handles ALL incoming HTTP traffic and issues a 301 redirect.
# The backend is never actually reached (Traefik redirects before proxying).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-http-redirect
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: __FO_NAMESPACE__-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
---
# ── HTTPS: API (/api → FastAPI on :8000) ──────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-api
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # No response-header timeout: API returns immediately (MinIO upload is async)
    traefik.ingress.kubernetes.io/service.servertransport: __FO_NAMESPACE__-api-no-timeout@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
---
# ── HTTPS: Kibana (/kibana → Kibana on :5601) ─────────────────────────────────
# No strip-prefix middleware here — Kibana handles the /kibana prefix itself
# via SERVER_BASEPATH + SERVER_REWRITEBASEPATH=true in its deployment env vars.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-kibana
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /kibana
            pathType: Prefix
            backend:
              service:
                name: kibana-service
                port:
                  number: 5601
---
# ── HTTPS: MinIO console (/minio → MinIO console on :9001) ────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-minio
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: __FO_NAMESPACE__-strip-minio@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /minio
            pathType: Prefix
            backend:
              service:
                name: minio-service
                port:
                  number: 9001
---
# ── HTTPS: Frontend SPA (/ catch-all) ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-frontend
  namespace: __FO_NAMESPACE__
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
