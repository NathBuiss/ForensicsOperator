# ── Traefik Middlewares ────────────────────────────────────────────────────────

# HTTP → HTTPS permanent redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: forensics-operator
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Strip /kibana prefix before forwarding to Kibana
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-kibana
  namespace: forensics-operator
spec:
  stripPrefix:
    prefixes:
      - /kibana
---
# Strip /minio prefix before forwarding to MinIO console
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-minio
  namespace: forensics-operator
spec:
  stripPrefix:
    prefixes:
      - /minio
---
# ── HTTP catch-all → redirect to HTTPS ────────────────────────────────────────
# This single rule handles ALL incoming HTTP traffic and issues a 301 redirect.
# The backend is never actually reached (Traefik redirects before proxying).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-http-redirect
  namespace: forensics-operator
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: forensics-operator-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
---
# ── HTTPS: API (/api → FastAPI on :8000) ──────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-api
  namespace: forensics-operator
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8000
---
# ── HTTPS: Kibana (/kibana → Kibana on :5601) ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-kibana
  namespace: forensics-operator
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: forensics-operator-strip-kibana@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /kibana
            pathType: Prefix
            backend:
              service:
                name: kibana-service
                port:
                  number: 5601
---
# ── HTTPS: MinIO console (/minio → MinIO console on :9001) ────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-minio
  namespace: forensics-operator
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: forensics-operator-strip-minio@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /minio
            pathType: Prefix
            backend:
              service:
                name: minio-service
                port:
                  number: 9001
---
# ── HTTPS: Frontend SPA (/ catch-all) ─────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forensics-frontend
  namespace: forensics-operator
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - __FO_HOSTNAME__
      secretName: forensics-tls
  rules:
    - host: __FO_HOSTNAME__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
