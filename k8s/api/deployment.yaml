apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: __FO_NAMESPACE__
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-elasticsearch
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z elasticsearch-service 9200; do echo waiting; sleep 3; done']
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting; sleep 2; done']
      containers:
        - name: api
          image: __FO_API_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret_key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-auth-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: plugins-volume
              mountPath: /app/plugins
              readOnly: true
      volumes:
        - name: plugins-volume
          persistentVolumeClaim:
            claimName: plugins-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: __FO_NAMESPACE__
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
