apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: forensics-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting; sleep 2; done']
        - name: wait-elasticsearch
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z elasticsearch-service 9200; do echo waiting; sleep 3; done']
        - name: wait-minio
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z minio-service 9000; do echo waiting; sleep 2; done']
      containers:
        - name: processor
          image: __FO_PROCESSOR_IMAGE__
          imagePullPolicy: __FO_PULL_POLICY__
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch-service:9200"
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_BUCKET
              value: "forensics-cases"
            - name: BULK_SIZE
              value: "500"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret_key
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: plugins-volume
              mountPath: /app/plugins
            - name: tmp-storage
              mountPath: /tmp
      volumes:
        - name: plugins-volume
          persistentVolumeClaim:
            claimName: plugins-pvc
        - name: tmp-storage
          emptyDir:
            sizeLimit: 10Gi
