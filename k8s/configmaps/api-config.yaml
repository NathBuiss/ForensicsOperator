apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: forensics-operator
data:
  ELASTICSEARCH_URL: "http://elasticsearch-service:9200"
  REDIS_URL: "redis://redis-service:6379/0"
  MINIO_ENDPOINT: "minio-service:9000"
  MINIO_BUCKET: "forensics-cases"
  PLUGINS_DIR: "/app/plugins"
  DEFAULT_PAGE_SIZE: "100"
  MAX_PAGE_SIZE: "1000"
  # Auth
  AUTH_ENABLED: "__FO_AUTH_ENABLED__"
  JWT_EXPIRE_HOURS: "__FO_JWT_EXPIRE_HOURS__"
---
# JWT signing secret — stored as a K8s Secret (not ConfigMap) so it is
# base64-encoded at rest and excluded from general config queries.
apiVersion: v1
kind: Secret
metadata:
  name: api-auth-secret
  namespace: forensics-operator
type: Opaque
stringData:
  JWT_SECRET: "__FO_JWT_SECRET__"
