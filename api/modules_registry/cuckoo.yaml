id: cuckoo
name: Cuckoo Sandbox
description: "Submit suspicious files to Cuckoo Sandbox for dynamic malware analysis. Reports include behavioral indicators, network activity, dropped files, and API calls."
input_extensions:
  - .exe
  - .dll
  - .msi
  - .bat
  - .ps1
  - .vbs
  - .js
  - .doc
  - .docx
  - .xls
  - .xlsx
  - .pdf
  - .jar
  - .apk
  - .zip
available: false
unavailable_reason: "Requires a Cuckoo Sandbox instance. Configure the Cuckoo API URL in Settings → Integrations."
run_on_files: true
config_keys:
  - cuckoo_api_url
  - cuckoo_api_token
